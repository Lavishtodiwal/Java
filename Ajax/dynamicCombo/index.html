<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function loadXMLDoc() {

            var keys = document.myform.sele.value;
            var urls = "db.jsp?ok=" + keys;

            var xmlhttp = new XMLHttpRequest();

            xmlhttp.onreadystatechange = function () {

                if (xmlhttp.readyState == 4 && xmlhttp.status == 200) {

                    removall();

                    var roott = xmlhttp.responseXML.documentElement;
                    var nodes = roott.getElementsByTagName("stdname");

                    for (var z = 0; z < nodes.length; z++) {
                        var ress = nodes[z].childNodes[0].nodeValue;
                        addoptions(ress);
                    }
                }
            };

            xmlhttp.open("GET", urls, true);
            xmlhttp.send();
        }

        function removall() {
            document.myform.sele2.options.length = 0;
        }

        function addoptions(reslt) {
            var ct1 = document.createElement("option");
            ct1.text = reslt;
            ct1.value = reslt;
            document.myform.sele2.add(ct1);
        }
    </script>

</head>

<body>
    <form name="myform">
        <select name="sele" onchange="loadXMLDoc()">
            <option>option</option>
            <option value="75">75</option>
            <option value="65">65</option>
            <option value="40">40</option>
        </select>
        Employee Name : <select name="sele2">
            <option>--choose--</option>
        </select>
    </form>
</body>

</html>
